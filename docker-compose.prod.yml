services:
  app:
    image: badreddineslaoui/localmind-backend
    container_name: localmind-backend
    restart: always
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always

  nuxt:
    image: badreddineslaoui/localmind-frontend
    container_name: localmind-frontend
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - nginx

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: "localmind"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - pgtables:/var/lib/postgresql/data

volumes:
  pgtables:

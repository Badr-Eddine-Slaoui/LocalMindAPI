server {
    listen 80;
    index index.php index.html;

    # 1. Handle Laravel Backend (API and Storage)
    # Move this ABOVE the root location so it takes priority
    location ~ ^/(api|storage|index.php) {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # 2. Handle Nuxt Frontend & Static Assets
    # This will catch /_nuxt/..., /favicon.ico, and all page routes
    location / {
        proxy_pass http://nuxt:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Remove the .css specific block you had earlier—Nuxt will handle 
    # its own CSS files through the proxy_pass above.
    
    location ~ /\.ht {
        deny all;
    }

    location ~* \.css$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        etag off;
    }
}